seed: 0
output_dir: experiment/outputs/wesad_eventclock
task:
  n_classes: 3
dataset:
  name: wesad
  params:
    path: data/processed/wesad_windows.npz
    channels_first: true
model:
  name: event_clock
  dim: 96
  k_tokens: 24
  scout_hidden: 64
  scout_depth: 3
  sigma: 0.05
  depth: 2
  heads: 4
  dropout: 0.15
loss:
  lambda_suff: 0.05
  lambda_nec: 0.05
  lambda_smooth: 0.01
  lambda_entropy: 0.001
  gamma: 0.5
train:
  epochs: 30
  batch_size: 64
  num_workers: 4
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  monitor: macro_f1
eval:
  max_evidence_batches: 4
robustness_eval:
  - name: wearable_noise
    noise_std: 0.05
  - name: sensor_dropout
    channel_dropout: 0.2
  - name: amplitude_shift
    amp_low: 0.8
    amp_high: 1.2

