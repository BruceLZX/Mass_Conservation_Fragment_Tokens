seed: 0
output_dir: experiment/outputs/synthetic_grid
task:
  n_classes: 2
dataset:
  name: synthetic_sparse
  params:
    splits:
      train: 1500
      val: 400
      test: 400
    length: 256
    channels: 1
    n_classes: 2
    motif_len: 24
    noise_std: 0.4
    motif_amp: 1.5
    distractor_prob: 0.25
    seed: 13
model:
  name: event_clock
  dim: 64
  k_tokens: 16
  scout_hidden: 48
  scout_depth: 2
  sigma: 0.06
  depth: 2
  heads: 4
  dropout: 0.1
loss:
  lambda_suff: 0.1
  lambda_nec: 0.1
  lambda_smooth: 0.01
  lambda_entropy: 0.001
  gamma: 0.5
train:
  epochs: 6
  batch_size: 64
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  monitor: macro_f1
eval:
  max_evidence_batches: 1
grid:
  seed: [0, 1, 2]
  model.k_tokens: [8, 16, 32]
  loss.lambda_suff: [0.0, 0.1]
  loss.lambda_nec: [0.0, 0.1]

