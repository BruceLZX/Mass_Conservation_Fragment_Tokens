seed: 0
output_dir: experiment/outputs/synthetic_decoy_grid
task:
  n_classes: 2
dataset:
  name: synthetic_sparse
  params:
    splits:
      train: 1500
      val: 400
      test: 400
    length: 256
    channels: 1
    n_classes: 2
    motif_len: 24
    noise_std: 0.35
    motif_amp: 1.2
    distractor_prob: 0.0
    discriminative_motif_all_classes: true
    decoy_prob: 1.0
    decoy_len: 56
    decoy_amp: 2.5
    decoy_cycles: 11
    seed: 29
model:
  name: event_clock
  dim: 64
  k_tokens: 8
  scout_hidden: 48
  scout_depth: 2
  sigma: 0.04
  mask_quantile: 0.9
  mask_temperature_scale: 0.35
  depth: 2
  heads: 4
  dropout: 0.1
loss:
  lambda_suff: 0.2
  lambda_nec: 0.2
  lambda_smooth: 0.02
  lambda_entropy: 0.001
  gamma: 0.6
train:
  epochs: 6
  batch_size: 64
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  monitor: importance_evidence_minus_decoy
eval:
  max_evidence_batches: 1
grid:
  seed: [0, 1, 2]
  model.k_tokens: [4, 8, 16]
  loss.lambda_suff: [0.0, 0.2]
  loss.lambda_nec: [0.0, 0.2]

