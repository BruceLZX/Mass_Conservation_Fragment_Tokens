seed: 0
output_dir: experiment/outputs/ppg_dalia_eventclock
task:
  n_classes: 5
dataset:
  name: ppg_dalia
  params:
    path: data/processed/ppg_dalia_windows.npz
    channels_first: true
model:
  name: event_clock
  dim: 96
  k_tokens: 24
  scout_hidden: 64
  scout_depth: 3
  sigma: 0.05
  depth: 2
  heads: 4
  dropout: 0.15
loss:
  lambda_suff: 0.05
  lambda_nec: 0.05
  lambda_smooth: 0.01
  lambda_entropy: 0.001
  gamma: 0.5
train:
  epochs: 30
  batch_size: 64
  num_workers: 4
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  monitor: macro_f1
eval:
  max_evidence_batches: 4
robustness_eval:
  - name: motion_artifact_noise
    noise_std: 0.08
  - name: ppg_dropout
    channel_dropout: 0.2
  - name: temporal_shift
    max_shift: 32

