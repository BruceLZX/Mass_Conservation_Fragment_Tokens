seed: 0
output_dir: experiment/outputs/synthetic_decoy_eventclock
task:
  n_classes: 2
dataset:
  name: synthetic_sparse
  params:
    splits:
      train: 2000
      val: 500
      test: 500
    length: 256
    channels: 1
    n_classes: 2
    motif_len: 24
    noise_std: 0.35
    motif_amp: 1.2
    distractor_prob: 0.0
    discriminative_motif_all_classes: true
    decoy_prob: 1.0
    decoy_len: 56
    decoy_amp: 2.5
    decoy_cycles: 11
    seed: 29
model:
  name: event_clock
  dim: 64
  k_tokens: 32
  uniform_tokens: 0
  scout_hidden: 48
  scout_depth: 2
  sigma: 0.04
  uniform_anchor_sigma: 0.04
  uniform_prior_mix: 0.15
  mask_quantile: 0.9
  mask_temperature_scale: 0.35
  depth: 2
  heads: 4
  dropout: 0.1
  coverage_patch_size: 16
loss:
  lambda_suff: 0.05
  lambda_nec: 0.05
  lambda_suff_ce: 0.5
  lambda_nec_ce: 0.2
  lambda_oracle_evidence: 0.5
  lambda_oracle_decoy: 1.0
  lambda_smooth: 0.02
  lambda_entropy: 0.001
  gamma: 0.6
  ce_margin: 1.2
train:
  epochs: 8
  batch_size: 64
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  monitor: evidence_score
eval:
  max_evidence_batches: 2
robustness_train:
  noise_std: 0.02
  max_shift: 2
robustness_eval:
  - name: noise_0p1
    noise_std: 0.1
  - name: shift_16
    max_shift: 16
  - name: mask_span_32
    mask_prob: 1.0
    mask_span: 32
