seed: 0
output_dir: experiment/outputs/synthetic_fixed_patch
task:
  n_classes: 2
dataset:
  name: synthetic_sparse
  params:
    n_samples: 2000
    splits:
      train: 2000
      val: 500
      test: 500
    length: 256
    channels: 1
    n_classes: 2
    motif_len: 24
    noise_std: 0.4
    motif_amp: 1.5
    distractor_prob: 0.25
    seed: 13
model:
  name: fixed_patch
  dim: 64
  patch_size: 16
  stride: 16
  depth: 2
  heads: 4
  dropout: 0.1
loss:
  lambda_suff: 0.0
  lambda_nec: 0.0
  lambda_smooth: 0.0
  lambda_entropy: 0.0
train:
  epochs: 8
  batch_size: 64
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  monitor: macro_f1
eval:
  max_evidence_batches: 0
robustness_eval:
  - name: noise_0p1
    noise_std: 0.1
  - name: shift_16
    max_shift: 16
  - name: mask_span_32
    mask_prob: 1.0
    mask_span: 32

